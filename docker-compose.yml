services:
  finguard-db:
    image: neo4j:latest
    container_name: finguard-db
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/password123
      - NEO4J_PLUGINS=["apoc"]

  finguard-app:
    build: .
    container_name: finguard-app
    ports:
      - "8501:8501"
    depends_on:
      - finguard-db